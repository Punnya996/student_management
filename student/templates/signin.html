<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- Card -->
        <div class="bg-white shadow-2xl rounded-3xl overflow-hidden">

            <!-- Header -->
            <div class="bg-gradient-to-r from-indigo-600 to-purple-600 p-6 text-center">
                <h1 class="text-3xl font-bold text-white">
                    Student Login
                </h1>
                <p class="text-indigo-100 mt-2">
                    Welcome Back
                </p>
            </div>

            <!-- Form Section -->
            <div class="p-8">

                <form method="post" class="space-y-5">
                    {% csrf_token %}

                    <!-- Django Form -->
                    <div class="space-y-4">
                        {{ form.as_p }}
                    </div>

                    <!-- Submit Button -->
                    <button
                        type="submit"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition duration-300 shadow-md hover:shadow-lg">
                        Sign In
                    </button>

                    <!-- Signup Link -->
                    <div class="text-center pt-3">
                        <span class="text-gray-600">
                            Don't have an account?
                        </span>
                        <a href="{% url 'signup' %}"
                           class="text-indigo-600 font-semibold hover:text-indigo-800 ml-1">
                            Register Now
                        </a>
                    </div>

                </form>

            </div>
        </div>
    </div>

</body>
</html>
